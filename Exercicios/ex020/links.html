<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-elementos</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>

        /*  Seletores Personalizados
            #  = id
            .  = class
            :  = pseudo-class
            :: = pseudo-element
            >  = clildren
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
        
            color: #ff0000;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited{
            color: darkred;
        }


        a:hover{
            color: black;
            text-decoration: underline ;
        }

        a:active{
            color: yellow;
        }

        .special{
            background-color: rgb(255, 140, 140);
        }

        .special::before{
            content: '⇒';
        }

        .special::after{
            content: '⇐';
            
        }

    </style>
</head>
<body>
    <ul>
        <li><a href="https://gustavoguanabara.github.io">GITHUB</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" class="special">YOUTBUE</a></li>
        <li><a href="https://www.cursoemvideo.com">CURSOA</a></li>
    </ul>
    <p><a href="nam.html">venha</a></p>
    <p><a href="index.html">VOLTA</a></p>
</body>
</html>
